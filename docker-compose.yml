version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: devfolio_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: ${DB_NAME:-devfolio}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-devfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    container_name: devfolio_scraper
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - DB_NAME=${DB_NAME:-devfolio}
      - SCRAPE_SIZE=${SCRAPE_SIZE:-50}
      - SCRAPE_DELAY=${SCRAPE_DELAY:-0.5}

  pgadmin:
    image: dpage/pgadmin4
    container_name: devfolio_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
